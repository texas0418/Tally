<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tally — Bill Splitter &amp; Tip</title>
<style>
  :root{color-scheme:light}
  body{margin:0;background:#f7f5f0;color:#1a1a18;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.6;text-align:center;}
  .wrap{max-width:620px;margin:0 auto;padding:80px 24px;}
  .mark{width:76px;height:76px;border-radius:18px;background:#efe9df;position:relative;overflow:hidden;margin:0 auto 20px;}
  .mark i{position:absolute;top:17px;width:15px;height:42px;border-radius:8px;}
  .mark .s{position:absolute;top:33px;left:4px;width:68px;height:15px;background:#1a1a18;border-radius:8px;transform:rotate(-14deg);}
  h1{font-size:34px;letter-spacing:-.6px;margin:0 0 10px;}
  p{font-size:18px;color:#44443f;margin:0 auto 32px;max-width:460px;}
  .links a{display:inline-block;margin:0 10px;color:#534ab7;font-weight:600;font-size:17px;text-decoration:none;}
  .accent{display:flex;gap:5px;max-width:320px;margin:28px auto 0;}
  .accent span{flex:1;height:5px;border-radius:3px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark"><i style="left:13px;background:#534ab7"></i><i style="left:31px;background:#1d9e75"></i><i style="left:49px;background:#d85a30"></i><i style="right:13px;background:#d4537e"></i><span class="s"></span></div>
  <h1>Tally</h1>
  <p>Split the restaurant bill by what each person actually ordered — scan the receipt, assign each dish, and tip and tax divide fairly to the cent. Private and on-device.</p>
  <div class="links">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
  <div class="accent"><span style="background:#534ab7"></span><span style="background:#1d9e75"></span><span style="background:#d85a30"></span><span style="background:#d4537e"></span></div>
</div>
</body>
</html>
